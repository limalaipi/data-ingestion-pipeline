# =====================================================================
# Source Registry — GENERATED FROM THE GOOGLE SHEET
# Regenerate with:  uv run python scripts/sync_registry.py
# Additions live in config/sources_extra.yml (not overwritten).
# ---------------------------------------------------------------------
# schema = topic DOMAIN (environment / transport / public_safety / urban / society)
# table  = {origin}_{dataset}   ·   group = origin (th/nyc/chicago/files, for DAGs)
# topic  = fine-grained subject tag
# =====================================================================

defaults:
  row_limit: 5000000
  sample: recent
  page_size: 50000

sources:

